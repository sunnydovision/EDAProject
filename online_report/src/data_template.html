<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;
  --surface:#ffffff;
  --surface2:#f0f1f7;
  --border:#dde1ec;
  --accent:#5b50e8;
  --accent2:#4338ca;
  --text:#1e2030;
  --muted:#8890aa;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:20px}

header{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:700;color:var(--accent2)}
header .back-link{font-size:14px;color:var(--accent);text-decoration:none}
header .back-link:hover{text-decoration:underline}

.info-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:20px}
.info-box h2{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--accent2)}
.info-box p{font-size:14px;line-height:1.6;color:var(--text)}
.info-box a{color:var(--accent);text-decoration:none;word-break:break-all}
.info-box a:hover{text-decoration:underline}

.table-container{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:13px}
th{background:var(--surface2);color:var(--accent2);padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);font-weight:600;position:sticky;top:0}
td{padding:8px 14px;border-bottom:1px solid var(--border);vertical-align:top}
tr:nth-child(even){background:var(--surface2)}
tr:hover{background:#f8f9ff}

/* ── Modal ── */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--surface);border-radius:12px;padding:24px;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:12px}
.modal p{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:16px}
.modal-url{background:var(--surface2);padding:10px;border-radius:6px;font-family:monospace;font-size:12px;word-break:break-all;color:var(--accent2);margin-bottom:16px}
.modal-buttons{display:flex;gap:12px;justify-content:flex-end}
.modal-btn{padding:8px 16px;border-radius:6px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.modal-btn.cancel{background:var(--surface2);color:var(--text)}
.modal-btn.cancel:hover{background:var(--border)}
.modal-btn.confirm{background:var(--accent);color:#fff}
.modal-btn.confirm:hover{background:var(--accent2)}

/* ── Responsive ── */
@media(max-width:768px){
  body{padding:12px}
  header{flex-direction:column;gap:12px;align-items:flex-start;padding:12px}
  .info-box{padding:12px 16px}
  .info-box h2{font-size:15px}
  .info-box p{font-size:13px}
  .modal{max-width:90%;padding:20px}
  table{font-size:12px}
  th,td{padding:6px 8px}
}
</style>
</head>
<body>

<header>
  <h1>{{TITLE}}</h1>
  <a href="selected_report.html" class="back-link">← Quay lại báo cáo metrics</a>
</header>

<div class="info-box">
  <h2>Nguồn dữ liệu</h2>
  <p>{{CITATION}}</p>
  <p><a href="{{SOURCE_URL}}" target="_blank">{{SOURCE_URL}}</a></p>
</div>

<div class="info-box">
  <h2>Mô tả</h2>
  <p>{{DESCRIPTION}}</p>
</div>

<div class="table-container">
  {{DATA_TABLE}}
</div>

<!-- Modal for external link confirmation -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Mở liên kết</h3>
    <p id="modalMessage">Bạn đang mở một liên kết bên ngoài website này.</p>
    <div class="modal-url" id="modalUrl"></div>
    <div class="modal-buttons">
      <button class="modal-btn cancel" id="modalCancel">Hủy</button>
      <button class="modal-btn confirm" id="modalConfirm">Mở liên kết</button>
    </div>
  </div>
</div>

<script>
// ── External Link Confirmation ──
const modalOverlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const modalMessage = document.getElementById('modalMessage');
const modalUrl = document.getElementById('modalUrl');
const modalCancel = document.getElementById('modalCancel');
const modalConfirm = document.getElementById('modalConfirm');
let pendingUrl = '';

function truncateUrl(url, maxLength = 50) {
  if (url.length <= maxLength) return url;
  return url.substring(0, maxLength) + '...';
}

function getLinkInfo(url) {
  if (url.includes('arxiv.org')) {
    return {
      title: 'Bài báo gốc',
      message: 'Bạn đang mở link tới bài báo gốc QUIS trên arXiv.'
    };
  } else if (url.includes('docs.google.com')) {
    return {
      title: 'Báo cáo kỹ thuật',
      message: 'Bạn đang mở link tới báo cáo kỹ thuật Nhóm 8 - C4 trên Google Docs.'
    };
  } else if (url.includes('kaggle.com')) {
    return {
      title: 'Tập dữ liệu',
      message: 'Bạn đang mở link tới tập dữ liệu trên Kaggle.'
    };
  } else {
    return {
      title: 'Liên kết bên ngoài',
      message: 'Bạn đang mở một liên kết bên ngoài website này.'
    };
  }
}

function showExternalLinkModal(url) {
  pendingUrl = url;
  const linkInfo = getLinkInfo(url);
  modalTitle.textContent = linkInfo.title;
  modalMessage.textContent = linkInfo.message;
  modalUrl.textContent = truncateUrl(url);
  modalOverlay.style.display = 'flex';
}

function hideExternalLinkModal() {
  modalOverlay.style.display = 'none';
  pendingUrl = '';
}

// Handle external link clicks
document.addEventListener('click', (e) => {
  const link = e.target.closest('a');
  if (!link) return;

  const href = link.getAttribute('href');
  if (!href) return;

  // Check if it's an external link (starts with http/https and not same origin)
  if (href.startsWith('http://') || href.startsWith('https://')) {
    const currentOrigin = window.location.origin;
    const linkOrigin = new URL(href).origin;

    if (linkOrigin !== currentOrigin) {
      e.preventDefault();
      showExternalLinkModal(href);
    }
  }
});

// Modal button handlers
modalCancel.addEventListener('click', hideExternalLinkModal);
modalConfirm.addEventListener('click', () => {
  if (pendingUrl) {
    window.open(pendingUrl, '_blank');
  }
  hideExternalLinkModal();
});

// Close modal on overlay click
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) {
    hideExternalLinkModal();
  }
});

// Close modal on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
    hideExternalLinkModal();
  }
});
</script>

</body>
</html>
